name: Auditor de Issues

on:
  issues:
    types: [closed]

jobs:
  vigilar-cierre:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar permisos de usuario
        id: check_user
        run: |
          # Lista exacta de los usuarios de GitHub de los Tech Leads
          ALLOWED_USERS=("JohnVanagandr" "EileenMendoza18" "andre1985dominiocom")
          
          ACTOR="${{ github.actor }}"
          
          if [[ " ${ALLOWED_USERS[*]} " =~ " ${ACTOR} " ]]; then
            echo "is_allowed=true" >> $GITHUB_OUTPUT
          else
            echo "is_allowed=false" >> $GITHUB_OUTPUT
          fi

      - name: Reabrir y amonestar
        if: steps.check_user.outputs.is_allowed == 'false'
        uses: actions/github-script@v6
        with:
          script: |
            // Reabrir el issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'open'
            });
            
            // Dejar el comentario disciplinario
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ **ALERTA DE FLUJO DE TRABAJO** ⚠️\n\n@${context.actor}, el cierre manual de incidencias está estrictamente prohibido en esta fábrica de software. \n\nLos Issues solo pueden ser cerrados automáticamente mediante la vinculación de un Pull Request (\`Closes #ID\`) tras la auditoría de un Tech Lead. El requerimiento ha sido reabierto.`
            });
